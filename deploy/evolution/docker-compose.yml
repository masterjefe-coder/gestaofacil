services:
  evolution-api:
    container_name: gestaofacil_evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
    ports:
      - "${EVOLUTION_BIND_IP:-127.0.0.1}:${EVOLUTION_HOST_PORT:-8081}:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances

  redis:
    container_name: gestaofacil_evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  postgres:
    container_name: gestaofacil_evolution_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  evolution_instances:
  redis_data:
  postgres_data:
